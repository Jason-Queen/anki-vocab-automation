name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies
      run: uv sync --locked --extra dev --extra test

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        uv run flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Test with pytest
      run: |
        uv run pytest tests/ -v --cov=src/anki_vocab_automation --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        use_oidc: true

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        save-cache: "false"

    - name: Install project dependencies
      run: uv sync --locked

    - name: Run safety check
      run: uv run --with safety safety check --json > safety-report.json

    - name: Run bandit security check
      run: uv run --with bandit bandit -r src/ -f json -o bandit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v6
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
